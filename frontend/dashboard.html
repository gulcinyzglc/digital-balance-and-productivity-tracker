<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">

        <aside class="sidebar">
            <h2>FocusFlow</h2>
            <p>Digital Balance Tracker</p>

            <button id="logoutBtn">
                Logout
            </button>
        </aside>

        <main class="dashboard-main">

            <h1>Dashboard</h1>
            

            <div class="stats">

                <div class="stat-card">
                    <h3>Total Screen Time</h3>
                    <p id="totalTime">0 min</p>
                </div>

                <div class="stat-card">
                    <h3>Total Records</h3>
                    <p id="totalRecords">0</p>
                </div>

                <div class="stat-card">
                    <h3>Most Used App</h3>
                    <p id="mostUsedApp">-</p>
                </div>

                <div class="stat-card">
                    <h3>Productivity Score</h3>
                    <p id="productivityScore">0%</p>
                </div>

            </div>

            <form id="usageForm">

                <input
                    type="text"
                    id="app_name"
                    placeholder="Application Name"
                    required
                >

                <select id="category" required>

                    <option value="">
                        Select Category
                    </option>

                    <option value="Productivity">
                        Productivity
                    </option>

                    <option value="Study">
                        Study
                    </option>

                    <option value="Coding">
                        Coding
                    </option>

                    <option value="Education">
                        Education
                    </option>

                    <option value="Social Media">
                        Social Media
                    </option>

                    <option value="Entertainment">
                >

                <input
                    type="number"
                    id="duration"
                    placeholder="Duration (minutes)"
                    required
                >

                <input
                    type="date"
                    id="usage_date"
                    required
                >

                <button type="submit">
                    Add Record
                </button>

            </form>

            <div id="usageList"></div>

        </main>

    </div>

    <script src="dashboard.js"></script>

</body>
</html>
