<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <h1>FocusFlow</h1>

            <p>
                Digital Balance & Productivity Tracker
            </p>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <button type="submit">
                    Login
                </button>

            </form>

            <a href="register.html">
                Create Account
            </a>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
